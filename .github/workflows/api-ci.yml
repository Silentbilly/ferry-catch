name: api-ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/api/**"
      - "packages/openapi/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/openapi/**"
      - ".github/workflows/api-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build & test
        run: ./gradlew clean test
