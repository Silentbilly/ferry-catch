name: Build & Push API image

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ferrycatch-api:latest
            ghcr.io/${{ github.repository_owner }}/ferrycatch-api:${{ github.sha }}
